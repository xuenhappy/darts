syntax="proto3";
package darts;
option optimize_for = LITE_RUNTIME;
message DRegexDat{
    int32 MaxLen=1;
    repeated int64  Check=2; 
    repeated int64  Base=3;
    repeated int64  Fail=4; 
    repeated int64  L=5;
    message AItem {
        repeated int64  item=1;
    }
    repeated AItem V=6;
    repeated AItem OutPut=7;              
    map<string,int32> CodeMap=8;
    repeated string Labels=9;

    // Compact v2 representation. Readers fall back to fields 2-7 for legacy files.
    repeated sint32 CheckCompact=10 [packed=true];
    repeated sint32 BaseCompact=11 [packed=true];
    repeated sint32 FailCompact=12 [packed=true];
    repeated uint32 LengthCompact=13 [packed=true];
    reserved 14 to 17;
    uint32 FormatVersion=18;
}


message BigramDat{
    map<int64,int64> freq=1;
    message bigram{
        int64 x=1;
        int64 y=2;
        int64 freq=3;
    }
    repeated bigram table=2;
    int64 avg_single_freq = 3;
    int64 max_single_freq = 4;
    int64 avg_union_freq = 5;
    repeated string words = 6;
    repeated uint64 history_total = 7 [packed=true];
    repeated uint32 history_types = 8 [packed=true];
    repeated uint32 continuation_types = 9 [packed=true];
    double discount = 10;
    uint64 total_unigram_freq = 11;
    uint64 total_bigram_types = 12;
    message char_count {
        uint32 codepoint = 1;
        uint64 freq = 2;
        uint32 history_types = 3;
        uint32 continuation_types = 4;
    }
    repeated char_count chars = 13;
    message char_bigram {
        uint32 x = 1;
        uint32 y = 2;
        uint64 freq = 3;
    }
    repeated char_bigram char_table = 14;
    double char_discount = 15;
    uint64 total_char_freq = 16;
    uint64 total_char_bigram_types = 17;
    uint32 format_version = 18;
}
